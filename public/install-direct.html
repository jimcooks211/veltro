<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Install Veltro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0A0F1E;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 100px;
    height: 100px;
    margin: 0 auto 30px;
    background: linear-gradient(135deg, #1A56FF 0%, #00D4FF 100%);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 800;
    box-shadow: 0 0 40px rgba(26,86,255,0.3);
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  p {
    color: #a8b2cc;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 30px;
  }
  .install-link {
    display: block;
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, #1A56FF 0%, #00D4FF 100%);
    color: #fff;
    text-decoration: none;
    border-radius: 16px;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(26,86,255,0.4);
    transition: transform 0.2s;
  }
  .install-link:active { transform: scale(0.98); }
  .info {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    text-align: left;
  }
  .info-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 14px;
  }
  .info-item:last-child { margin-bottom: 0; }
  .check {
    width: 20px;
    height: 20px;
    background: #00E676;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">V</div>
  <h1>Install Veltro</h1>
  <p>One-tap installation to your home screen</p>

  <a href="/Veltro.mobileconfig" class="install-link">
    ⬇️ Install Now
  </a>

  <div class="info">
    <div class="info-item">
      <div class="check">✓</div>
      <div>No app store needed</div>
    </div>
    <div class="info-item">
      <div class="check">✓</div>
      <div>Direct installation</div>
    </div>
    <div class="info-item">
      <div class="check">✓</div>
      <div>Full-screen experience</div>
    </div>
    <div class="info-item">
      <div class="check">✓</div>
      <div>Works offline</div>
    </div>
  </div>
</div>

<script>
  // Auto-redirect to mobileconfig after 1 second
  setTimeout(() => {
    window.location.href = '/Veltro.mobileconfig';
  }, 1000);
</script>

</body>
</html>
