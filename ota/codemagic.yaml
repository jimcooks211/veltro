workflows:
  veltro-ios:
    name: Veltro iOS IPA
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: xyz.appinstall.nov.carbon.lam
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Vite app
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set iOS deployment target
        script: |
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '16.0'/" ios/App/Podfile
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
            ios/App/App.xcodeproj/project.pbxproj

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install --repo-update

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Veltro.xcarchive" \
            -destination "generic/platform=iOS" \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/Veltro.xcarchive" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/ipa"

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
