name: Build Veltro IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 3. Install & build ──
      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      # ── 4. Copy web assets ──
      - name: Copy web assets to iOS
        run: npx cap copy ios

      # ── 5. Fix deployment target ──
      - name: Set iOS deployment target to 16.0
        run: |
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '16.0'/" ios/App/Podfile
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
            ios/App/App.xcodeproj/project.pbxproj
          echo "✓ $(grep 'platform :ios' ios/App/Podfile)"

      # ── 6. Fix bundle ID ──
      - name: Set bundle ID to match provisioning profile
        run: |
          sed -i '' \
            's/PRODUCT_BUNDLE_IDENTIFIER = com.veltro.app/PRODUCT_BUNDLE_IDENTIFIER = xyz.appinstall.nov.carbon.lam/g' \
            ios/App/App.xcodeproj/project.pbxproj
          echo "✓ $(grep 'PRODUCT_BUNDLE_IDENTIFIER' ios/App/App.xcodeproj/project.pbxproj | head -1)"

      # ── 7. CocoaPods ──
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      # ── 8. Patch Pods to use automatic signing ──
      - name: Patch Pods project for automatic signing
        run: |
          PODS_PBXPROJ="ios/App/Pods/Pods.xcodeproj/project.pbxproj"

          # Remove any hardcoded PROVISIONING_PROFILE lines
          sed -i '' '/PROVISIONING_PROFILE/d' "$PODS_PBXPROJ"

          # Set automatic code sign style
          sed -i '' \
            's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' \
            "$PODS_PBXPROJ"

          # Disable code signing entirely on pod targets
          sed -i '' \
            's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' \
            "$PODS_PBXPROJ"
          sed -i '' \
            's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' \
            "$PODS_PBXPROJ"

          echo "✓ Pods signing patched"
          grep -c "PROVISIONING_PROFILE" "$PODS_PBXPROJ" && echo "⚠ PROVISIONING_PROFILE still present" || echo "✓ No PROVISIONING_PROFILE in Pods"

      # ── 9. Install certificates ──
      - name: Install Apple certificates and profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          echo "$IOS_P12_BASE64" | base64 --decode > certificate.p12
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | \
            plutil -extract UUID raw -)
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "Profile UUID → $PROFILE_UUID"

          security create-keychain -p "build123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import certificate.p12 \
            -k build.keychain \
            -P "$IOS_P12_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "build123" build.keychain

          echo "── Signing identities ──"
          security find-identity -v -p codesigning build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

      # ── 10. Archive ──
      - name: Archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Veltro.xcarchive \
            -destination "generic/platform=iOS" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=ZDV8SQG3XZ \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain"

      # ── 11. Export IPA ──
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Veltro.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # ── 12. Upload artifact ──
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Veltro-IPA
          path: ${{ runner.temp }}/ipa/App.ipa
          retention-days: 14