name: Build Veltro IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 3. Install & build web app ──
      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      # ── 4. Capacitor sync ──
      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ── 5. CocoaPods ──
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      # ── 6. Install certificates ──
      - name: Install Apple certificates and profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          # Decode files
          echo "$IOS_P12_BASE64" | base64 --decode > certificate.p12
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          # Get UUID from provisioning profile
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | \
            plutil -extract UUID raw -)
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

          # Create keychain
          security create-keychain -p "build123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          security import certificate.p12 \
            -k build.keychain \
            -P "$IOS_P12_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "build123" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

      # ── 7. Archive ──
      - name: Archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Veltro.xcarchive \
            -destination "generic/platform=iOS" \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      # ── 8. Export IPA ──
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Veltro.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # ── 9. Upload artifact ──
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Veltro-IPA
          path: ${{ runner.temp }}/ipa/App.ipa
          retention-days: 14
