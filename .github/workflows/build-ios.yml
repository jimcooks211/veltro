name: Build Veltro IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 3. Install & build ──
      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      # ── 4. Copy web assets ──
      - name: Copy web assets to iOS
        run: npx cap copy ios

      # ── 5. Fix deployment target ──
      - name: Set iOS deployment target to 16.0
        run: |
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '16.0'/" ios/App/Podfile
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
            ios/App/App.xcodeproj/project.pbxproj
          echo "✓ $(grep 'platform :ios' ios/App/Podfile)"

      # ── 6. Fix bundle ID ──
      - name: Set bundle ID
        run: |
          sed -i '' \
            's/PRODUCT_BUNDLE_IDENTIFIER = com.veltro.app/PRODUCT_BUNDLE_IDENTIFIER = xyz.appinstall.nov.carbon.lam/g' \
            ios/App/App.xcodeproj/project.pbxproj
          echo "✓ $(grep 'PRODUCT_BUNDLE_IDENTIFIER' ios/App/App.xcodeproj/project.pbxproj | head -1)"

      # ── 7. Generate iOS icons using sips (built into macOS) ──
      - name: Generate iOS app icons
        run: |
          ICON_SRC="public/apple-touch-icon-180x180.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"

          sips -z 20   20   "$ICON_SRC" --out "$ICON_DIR/AppIcon20x20@1x.png"   > /dev/null
          sips -z 40   40   "$ICON_SRC" --out "$ICON_DIR/AppIcon20x20@2x.png"   > /dev/null
          sips -z 60   60   "$ICON_SRC" --out "$ICON_DIR/AppIcon20x20@3x.png"   > /dev/null
          sips -z 29   29   "$ICON_SRC" --out "$ICON_DIR/AppIcon29x29@1x.png"   > /dev/null
          sips -z 58   58   "$ICON_SRC" --out "$ICON_DIR/AppIcon29x29@2x.png"   > /dev/null
          sips -z 87   87   "$ICON_SRC" --out "$ICON_DIR/AppIcon29x29@3x.png"   > /dev/null
          sips -z 40   40   "$ICON_SRC" --out "$ICON_DIR/AppIcon40x40@1x.png"   > /dev/null
          sips -z 80   80   "$ICON_SRC" --out "$ICON_DIR/AppIcon40x40@2x.png"   > /dev/null
          sips -z 120  120  "$ICON_SRC" --out "$ICON_DIR/AppIcon40x40@3x.png"   > /dev/null
          sips -z 120  120  "$ICON_SRC" --out "$ICON_DIR/AppIcon60x60@2x.png"   > /dev/null
          sips -z 180  180  "$ICON_SRC" --out "$ICON_DIR/AppIcon60x60@3x.png"   > /dev/null
          sips -z 76   76   "$ICON_SRC" --out "$ICON_DIR/AppIcon76x76@1x.png"   > /dev/null
          sips -z 152  152  "$ICON_SRC" --out "$ICON_DIR/AppIcon76x76@2x.png"   > /dev/null
          sips -z 167  167  "$ICON_SRC" --out "$ICON_DIR/AppIcon83.5x83.5@2x.png" > /dev/null
          sips -z 1024 1024 "$ICON_SRC" --out "$ICON_DIR/AppIcon1024x1024@1x.png" > /dev/null

          echo "✓ iOS icons generated via sips"

      # ── 7b. Write Contents.json so Xcode assigns all icons ──
      - name: Write AppIcon Contents.json
        run: |
          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images": [
              { "filename": "AppIcon20x20@1x.png",     "idiom": "iphone",        "scale": "1x", "size": "20x20" },
              { "filename": "AppIcon20x20@2x.png",     "idiom": "iphone",        "scale": "2x", "size": "20x20" },
              { "filename": "AppIcon20x20@3x.png",     "idiom": "iphone",        "scale": "3x", "size": "20x20" },
              { "filename": "AppIcon29x29@1x.png",     "idiom": "iphone",        "scale": "1x", "size": "29x29" },
              { "filename": "AppIcon29x29@2x.png",     "idiom": "iphone",        "scale": "2x", "size": "29x29" },
              { "filename": "AppIcon29x29@3x.png",     "idiom": "iphone",        "scale": "3x", "size": "29x29" },
              { "filename": "AppIcon40x40@1x.png",     "idiom": "iphone",        "scale": "1x", "size": "40x40" },
              { "filename": "AppIcon40x40@2x.png",     "idiom": "iphone",        "scale": "2x", "size": "40x40" },
              { "filename": "AppIcon40x40@3x.png",     "idiom": "iphone",        "scale": "3x", "size": "40x40" },
              { "filename": "AppIcon60x60@2x.png",     "idiom": "iphone",        "scale": "2x", "size": "60x60" },
              { "filename": "AppIcon60x60@3x.png",     "idiom": "iphone",        "scale": "3x", "size": "60x60" },
              { "filename": "AppIcon76x76@1x.png",     "idiom": "ipad",          "scale": "1x", "size": "76x76" },
              { "filename": "AppIcon76x76@2x.png",     "idiom": "ipad",          "scale": "2x", "size": "76x76" },
              { "filename": "AppIcon83.5x83.5@2x.png", "idiom": "ipad",          "scale": "2x", "size": "83.5x83.5" },
              { "filename": "AppIcon1024x1024@1x.png", "idiom": "ios-marketing", "scale": "1x", "size": "1024x1024" }
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF
          echo "✓ Contents.json written"

      # ── 8. CocoaPods ──
      - name: Install CocoaPods
        run: cd ios/App && pod install --repo-update

      # ── 9. Install certificates ──
      - name: Install Apple certificates and profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          echo "$IOS_P12_BASE64" | base64 --decode > certificate.p12
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "✓ Profile UUID → $PROFILE_UUID"

          security create-keychain -p "build123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "build123" build.keychain

          echo "── Signing identities ──"
          security find-identity -v -p codesigning build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

      # ── 10. Inject signing into App target only ──
      - name: Inject signing into App target pbxproj
        run: |
          python3 << 'PYEOF'
          import re, os, sys

          pbx = open("ios/App/App.xcodeproj/project.pbxproj").read()
          profile_uuid = os.environ["PROFILE_UUID"]
          team_id = "ZDV8SQG3XZ"

          inject = (
              f'\n\t\t\tCODE_SIGN_IDENTITY = "iPhone Distribution";'
              f'\n\t\t\tCODE_SIGN_STYLE = Manual;'
              f'\n\t\t\tDEVELOPMENT_TEAM = {team_id};'
              f'\n\t\t\tPROVISIONING_PROFILE = "{profile_uuid}";'
              f'\n\t\t\tPROVISIONING_PROFILE_SPECIFIER = "";'
          )

          pattern = r'(PRODUCT_BUNDLE_IDENTIFIER = xyz\.appinstall\.nov\.carbon\.lam;)'
          replacement = r'\1' + inject
          updated = re.sub(pattern, replacement, pbx)

          if updated == pbx:
              print("WARNING: bundle ID pattern not found — check pbxproj")
              sys.exit(1)

          open("ios/App/App.xcodeproj/project.pbxproj", "w").write(updated)
          print("✓ Signing injected into App target")
          PYEOF

      # ── 11. Archive ──
      - name: Archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Veltro.xcarchive \
            -destination "generic/platform=iOS" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            archive

      # ── 12. Export IPA ──
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Veltro.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # ── 13. Upload artifact ──
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Veltro-IPA
          path: ${{ runner.temp }}/ipa/App.ipa
          retention-days: 14