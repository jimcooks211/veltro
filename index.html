    <style>
     *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


      #veltro-splash {
        position: fixed;
        inset: 0;
        background: #0A0F1E;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 300ms ease-out;
      }

      #veltro-splash svg {
        transform: translate(0, .7rem);
        height: 287px;
        width: 287px;
        transition:  all 300ms ease-in-out;
      }

      #veltro-splash span {
        font-family: -apple-system, sans-serif;
        font-size: 52px;
        font-weight: 800;
        color: #F0F4FF;
        letter-spacing: 8px;
        transition: font-size 300ms ease-out, letter-spacing 300ms ease-out;
      }

      #veltro-splash.shrink svg {
        width: 126px;
        height: 126px;
      }

      #veltro-splash.shrink span {
        font-size: 25px;
        letter-spacing: 4px;
      }
    </style>
  </head>

  <body>
    <!-- Splash inside body -->
<div id="veltro-splash">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="50%"  stop-color="#1A56FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0A0F1E"/>

  <!-- Outer hex ring -->
  <path
    d="M16 2 L29 9 L29 23 L16 30 L3 23 L3 9 Z"
    stroke="url(#vGrad)" stroke-width="0.8" fill="none" opacity="0.3"
  />

  <!-- V shape -->
  <path
    d="M7 9 L16 24 L25 9"
    stroke="url(#vGrad)" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round" fill="none"
  />

  <!-- Gold slash -->
  <line x1="11" y1="16.5" x2="21" y2="16.5" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16.5" r="1.5" fill="#00D4FF"/>
</svg>
      <span>VELTRO</span>
    </div>

    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('veltro-splash')
          if (!splash) return

          // Step 1 — shrink SVG and font simultaneously
          splash.classList.add('shrink')

          // Step 2 — fade out after shrink completes
          setTimeout(function () {
            splash.style.opacity = '0'

            // Step 3 — remove from DOM after fade
            setTimeout(function () {
              splash.remove()
            }, 500)
          }, 500)

        }, 1500)
      })
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
